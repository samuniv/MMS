name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        browser: [chromium, firefox]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Install Playwright browsers
        run: |
          cd tests/MeetingManagementSystem.E2ETests
          dotnet build
          pwsh bin/Release/net9.0/playwright.ps1 install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: |
          dotnet test tests/MeetingManagementSystem.E2ETests/MeetingManagementSystem.E2ETests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results-${{ matrix.browser }}.trx" \
            --logger "console;verbosity=detailed" \
            --filter "BrowserType=${{ matrix.browser }}"
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}
          path: |
            **/TestResults/**/*.trx
            **/test-results/**/*.zip
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ matrix.browser }}
          path: |
            tests/MeetingManagementSystem.E2ETests/test-results/**/*.zip
          retention-days: 7

      - name: Publish test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results (${{ matrix.browser }})
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: false

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run integration tests
        run: |
          dotnet test tests/MeetingManagementSystem.E2ETests/MeetingManagementSystem.E2ETests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=integration-test-results.trx" \
            --logger "console;verbosity=detailed" \
            --filter "FullyQualifiedName~Integration"
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          CI: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            **/TestResults/**/*.trx
          retention-days: 7

      - name: Publish integration test summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Integration Test Results
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: false

  test-summary:
    runs-on: ubuntu-latest
    needs: [e2e-tests, integration-tests]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-test-results

      - name: Display test results summary
        run: |
          echo "## E2E Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All test artifacts have been collected and are available in the Actions artifacts." >> $GITHUB_STEP_SUMMARY
